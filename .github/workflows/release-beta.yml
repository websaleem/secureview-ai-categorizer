name: release (beta)

# Beta: tag with a -beta suffix, e.g. v1.0.4-beta or v1.0.4-beta.2.
# Builds a separate zip whose manifest.name is "SecureView Beta" and
# publishes to the beta extension entry on the Chrome Web Store.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+-beta*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify tag base matches manifest version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          MANIFEST=$(node -p "require('./manifest.json').version")
          TAG=${GITHUB_REF#refs/tags/v}
          # Strip the -beta... suffix before comparing.
          BASE=${TAG%%-*}
          if [ "$MANIFEST" != "$BASE" ]; then
            echo "::error::Tag v$TAG (base $BASE) does not match manifest.json version $MANIFEST"
            exit 1
          fi

      - name: Build beta zip
        env:
          CHANNEL: beta
        run: ./scripts/build-zip.sh

      - name: Upload + publish to Chrome Web Store (beta entry)
        env:
          CWS_CLIENT_ID:     ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID:  ${{ secrets.CWS_EXTENSION_ID_BETA }}
        run: |
          ZIP=$(ls SecureView-Beta-*.zip | head -1)
          test -f "$ZIP" || { echo "no beta zip produced"; exit 1; }
          npx --yes chrome-webstore-upload-cli@3 upload \
            --source "$ZIP" \
            --extension-id  "$CWS_EXTENSION_ID" \
            --client-id     "$CWS_CLIENT_ID" \
            --client-secret "$CWS_CLIENT_SECRET" \
            --refresh-token "$CWS_REFRESH_TOKEN" \
            --auto-publish

      - uses: actions/upload-artifact@v4
        with:
          name: SecureView-Beta-${{ github.ref_name }}
          path: SecureView-Beta-*.zip
          retention-days: 90
