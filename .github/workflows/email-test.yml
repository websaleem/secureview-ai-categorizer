name: email test

# Manual-only smoke test for the deployment-notification SMTP setup.
# Trigger from Actions → email test → Run workflow. Delete this file once
# you've confirmed the email actually arrives.

on:
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send test email
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_APP_PASSWORD }}
          from: SecureView CI <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_TO }}
          subject: "[SecureView · test] SMTP smoke test"
          body: |
            This is a one-off test of the deployment-notification email path.

            If you received this, MAIL_USERNAME / MAIL_APP_PASSWORD / MAIL_TO
            are wired correctly and the real release / release-beta workflows
            will email you when they finish.

            Triggered:  ${{ github.event_name }} by ${{ github.actor }}
            Commit:     ${{ github.sha }}
            Run:        https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
